<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog preview card</title>
  <style>
    /* Tana fon va markazlashtirish */
    body {
      background-color: #f9d949; /* sariq fon */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Kartochka */
    .card {
      background: white;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* Rasm qismi */
    .card img {
      width: 100%;
      display: block;
    }

    /* Ichki qism */
    .content {
      padding: 20px;
    }

    /* Yellow label */
    .label {
      display: inline-block;
      background-color: #f9d949;
      color: #333;
      font-weight: 700;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    /* Sana */
    .date {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
    }

    /* Sarlavha */
    .title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #222;
    }

    /* Tavsif */
    .description {
      font-size: 14px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 20px;
    }

    /* Muallif */
    .author {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #222;
      font-size: 14px;
    }

    /* Muallif rasmi */
    .author img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="./assets/images/illustration-article.svg" alt="Blog header image" />
    <div class="content">
      <div class="label">Learning</div>
      <div class="date">Published 21 Dec 2023</div>
      <h1 class="title">HTML & CSS foundations</h1>
      <p class="description">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
      <div class="author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper" />
        Greg Hooper
      </div>
    </div>
  </div>
</body>
</html>
